name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pitch-roulette/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_KEY }}
          DEMO_MODE: true
          ESPN_ENABLED: false
          MOCK_MODE: true
        run: pytest tests/ -v --tb=short --cov=services --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: pitch-roulette/backend/coverage.xml
          fail_ci_if_error: false

  frontend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pitch-roulette/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pitch-roulette/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test:unit -- --coverage

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: pitch-roulette/frontend/coverage/coverage-final.json
          fail_ci_if_error: false

  # E2E is manual/nightly — not on PR due to credential requirements.
  # See follow-up: .github/workflows/e2e-nightly.yml
