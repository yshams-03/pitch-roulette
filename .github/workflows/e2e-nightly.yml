# Nightly E2E — demo + host controls against real Supabase (no live fixture required).
# Secrets: SUPABASE_URL, SUPABASE_KEY, VITE_SUPABASE_ANON_KEY, E2E_TEST_EMAIL, E2E_TEST_PASSWORD
name: E2E Nightly

on:
  schedule:
    - cron: '0 2 * * *' # 02:00 UTC daily
  workflow_dispatch:

concurrency:
  group: e2e-nightly
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: pitch-roulette

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        working-directory: pitch-roulette/backend
        run: pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pitch-roulette/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: pitch-roulette/frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: pitch-roulette/frontend
        run: npx playwright install chromium --with-deps

      - name: Write frontend .env for E2E
        working-directory: pitch-roulette/frontend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing SUPABASE_URL or VITE_SUPABASE_ANON_KEY repository secrets"
            exit 1
          fi
          cat > .env <<EOF
          VITE_SUPABASE_URL=${SUPABASE_URL}
          VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
          VITE_API_BASE_URL=http://127.0.0.1:8000
          EOF

      - name: Start backend
        working-directory: pitch-roulette/backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_KEY }}
          DEMO_MODE: 'true'
          ESPN_ENABLED: 'false'
          MOCK_MODE: 'true'
          FOOTBALL_DATA_API_KEY: e2e-placeholder
          FRONTEND_URL: http://127.0.0.1:5173
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          echo $! > /tmp/backend.pid
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:8000/api/health > /dev/null; then
              echo "Backend ready"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Backend failed to start"
          exit 1

      - name: Run E2E (demo + host controls)
        working-directory: pitch-roulette/frontend
        env:
          CI: true
          E2E_API_URL: http://127.0.0.1:8000
          E2E_BASE_URL: http://127.0.0.1:5173
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: |
          if [ -z "$E2E_TEST_EMAIL" ] || [ -z "$E2E_TEST_PASSWORD" ]; then
            echo "::error::Missing E2E_TEST_EMAIL or E2E_TEST_PASSWORD repository secrets"
            exit 1
          fi
          npm run test:e2e:nightly

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: pitch-roulette/frontend/playwright-report/
          retention-days: 7

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill "$(cat /tmp/backend.pid)" 2>/dev/null || true
          fi
